dubbo:
  application:
    name: dubbo-python
    owner: dubbo community
  registry:
    address: zookeeper://127.0.0.1:2181

  protocol:
    - name: tri
      port: 5000

  provider:
    timeout: 5000
    retries: 3
    actives: 200
    cluster: failover
    loadbalance: random
    weight: 100

  consumer:
    check: false
    timeout: 3000
    retries: 2
    actives: 100
    cluster: failover
    loadbalance: leastactive

  config-center:
    protocol: nacos
    address: nacos://127.0.0.1:8848
    username: nacos
    password: nacos
